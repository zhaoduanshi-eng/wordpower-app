<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Power App</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7f9eb2">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>Word Power – Session 1</header>

<div class="container">
  <div class="idea-card">
    <div class="word" id="word"></div>
    <p><b>中文释义：</b><span id="meaning"></span></p>
    <button onclick="speak()">发音</button>
  </div>

  <div class="quiz-box">
    <h3>选择题</h3>
    <p id="question"></p>
    <div id="options"></div>
    <br>
    <button onclick="nextQuestion()">下一题</button>
  </div>
</div>
  
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
